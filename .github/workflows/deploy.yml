name: Build, push & auto-deploy

# Push to main → run tests → build image → push to GHCR.
# The VPS pulls it itself: a cron (/opt/kairos/auto-deploy.sh, ~every 2 min) runs
# `docker compose pull && up -d` when a new image lands — no inbound SSH from GitHub's
# runners (that path proved flaky). The ./data volume persists; only the image swaps.
# (single-user sunset 2026-06-20 — multi-user promoted to main; main is the only branch)
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/philippsolay/kairos

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run suite (stdlib-only, no deps)
        run: python -m unittest test_kiros test_auth test_isolation test_backups test_conflict

  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    # No SSH-deploy job: the VPS cron (/opt/kairos/auto-deploy.sh) pulls the new image
    # within ~2 min. GitHub only needs to push to GHCR — no inbound connection to the VPS.
