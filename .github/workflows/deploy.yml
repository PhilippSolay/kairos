name: Deploy to VPS

# Push to main / feat/multi-user → run tests → build image → push to GHCR →
# SSH into the VPS and `docker compose pull && up -d`. Mirrors the ibu-kadek-catering
# pipeline. The ./data volume on the VPS persists across deploys (only the image swaps).
on:
  push:
    branches: [main, feat/multi-user]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/philippsolay/kairos

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run suite (stdlib-only, no deps)
        run: python -m unittest test_kiros test_auth test_isolation

  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (sync compose + pull/restart, retried 3×)
        env:
          KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_SSH_HOST }}
          USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          printf '%s\n' "$KEY" > key && chmod 600 key
          H="$USER@$HOST"
          OPTS="-i key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=10"
          ok=0
          for i in 1 2 3; do
            if scp $OPTS docker-compose.yml "$H:/opt/kairos/docker-compose.yml" \
               && ssh $OPTS "$H" 'cd /opt/kairos && docker compose pull && docker compose up -d && docker image prune -f'; then
              echo "✅ deployed on attempt $i"; ok=1; break
            fi
            echo "⚠️ attempt $i failed (likely transient SSH timeout / fail2ban) — retrying in 20s"; sleep 20
          done
          rm -f key
          [ "$ok" = 1 ] || { echo "❌ deploy failed after 3 attempts"; exit 1; }
