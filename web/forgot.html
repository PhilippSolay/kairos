<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password · Kiros</title>
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
  <main class="auth-card">
    <img class="auth-logo" src="/logo-wt.svg" alt="Kiros">
    <h1>Reset your password</h1>
    <p class="auth-sub">We'll email you a link to set a new one.</p>
    <form data-auth="forgot" data-endpoint="/api/auth/forgot">
      <div class="fld">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <button type="submit">Send reset link</button>
      <div class="err" id="err"></div>
    </form>
    <p class="auth-alt"><a href="/login">Back to sign in</a></p>
  </main>
  <script src="/auth.js"></script>
</body>
</html>
