<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Kiros</title>
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
  <main class="auth-card">
    <img class="auth-logo" src="/logo-wt.svg" alt="Kiros">
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your board.</p>
    <form data-auth="login" data-endpoint="/api/auth/login">
      <div class="fld">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="fld">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Sign in</button>
      <div class="err" id="err"></div>
    </form>
    <p class="auth-alt"><a href="/forgot">Forgot password?</a></p>
    <p class="auth-alt">New here? <a href="/signup">Create an account</a></p>
  </main>
  <script src="/auth.js"></script>
</body>
</html>
