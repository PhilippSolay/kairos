<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Kiros</title>
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/auth.css">
  <style>
    body { display: block; align-items: stretch; padding: 28px 22px; }
    .admin-wrap { max-width: 920px; margin: 0 auto; }
    .admin-head { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
    .admin-head img { width: 32px; height: 32px; }
    .admin-head h1 { font-size: 20px; margin: 0; flex: 1; }
    .admin-head a { color: var(--accent); text-decoration: none; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.03em; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .badge { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: var(--accent-soft, rgba(217,119,87,.15)); color: var(--accent); }
    .muted { color: var(--muted); }
    .empty { color: var(--muted); padding: 30px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-head">
      <img src="/logo-wt.svg" alt="Kiros">
      <h1>Admin</h1>
      <a href="/">← Back to app</a>
    </div>
    <div id="content"><p class="empty">Loading…</p></div>
  </div>
  <script>
    const fmtDate = (s) => {
      if (!s) return "—";
      try { return new Date(s).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }); }
      catch (e) { return s.slice(0, 16).replace("T", " "); }
    };
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    fetch("/api/admin/users").then(async (res) => {
      const content = document.getElementById("content");
      if (res.status === 403) { content.innerHTML = '<p class="empty">Forbidden — admins only.</p>'; return; }
      if (res.status === 401) { location.href = "/login"; return; }
      const data = await res.json();
      const users = data.users || [];
      if (!users.length) { content.innerHTML = '<p class="empty">No users yet.</p>'; return; }
      const rows = users.map((u) => `
        <tr>
          <td>${esc(u.name) || '<span class="muted">—</span>'} ${u.isAdmin ? '<span class="badge">admin</span>' : ''}${u.active ? '' : ' <span class="muted">(deactivated)</span>'}</td>
          <td class="muted">${esc(u.email)}</td>
          <td class="num">${u.companies}</td>
          <td class="num">${u.projects}</td>
          <td class="num">${u.tasks}</td>
          <td class="muted">${fmtDate(u.lastSeen)}</td>
        </tr>`).join("");
      content.innerHTML = `
        <table>
          <thead><tr><th>Name</th><th>Email</th><th class="num">Companies</th><th class="num">Projects</th><th class="num">Tasks</th><th>Last use</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }).catch(() => {
      document.getElementById("content").innerHTML = '<p class="empty">Could not load users.</p>';
    });
  </script>
</body>
</html>
