# Reverse-proxied by a shared Traefik instance on the external `proxy` network,
# cert resolver `mytlschallenge` (TLS-ALPN-01). See the VPS Deploy SOP for details.
# Kairos exposes no host ports — Traefik reaches it over the shared network.
# MULTI-USER: the app has its own login (signup + cookie sessions) — no Basic Auth.
# Identity (kiros.db) + per-user boards live in ./data. Convert an existing single-user
# ./data with migrate_to_multiuser.py before first start (see DEPLOY.md).
# Do NOT set KIROS_DEV in prod — it drops the Secure cookie flag.
name: kairos
services:
  kairos:
    image: ghcr.io/philippsolay/kairos:latest   # built + pushed by .github/workflows/deploy.yml; the VPS pulls it
    container_name: kairos
    restart: unless-stopped
    env_file: .env            # legacy; only the one-time migration reads KIROS_AUTH_PASS (new admin's pw). App ignores it.
    environment:
      KIROS_HOST: 0.0.0.0
      KIROS_PORT: "8765"
      KIROS_DATA: /data
      KIROS_NO_OPEN: "1"
    volumes:
      - ./data:/data          # kiros.db + users/<uid>/{KIROS.md,descriptions.json,completions.jsonl} persist here
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.kairos.rule=Host(`kairos.solay.cloud`)"
      - "traefik.http.routers.kairos.entrypoints=websecure"
      - "traefik.http.routers.kairos.tls.certresolver=mytlschallenge"
      - "traefik.http.services.kairos.loadbalancer.server.port=8765"

networks:
  proxy:
    external: true
